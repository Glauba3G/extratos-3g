<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Extratos 3G</title>
<link href="./index_files/css2" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--s1:#13161e;--s2:#191c27;--s3:#1e2233;
  --bd:#252836;--bd2:#2f3347;
  --green:#34d399;--green-bg:rgba(52,211,153,.09);
  --red:#fb7185;--red-bg:rgba(251,113,133,.09);
  --blue:#818cf8;--blue-bg:rgba(129,140,248,.09);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.09);
  --text:#dde1ef;--m1:#8b90a8;--m2:#5c6278;
  --fn:'DM Mono',monospace;--fh:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fn);font-size:13px;min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:36px 32px;width:100%;max-width:360px;}
.login-logo{font-family:var(--fh);font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--m2);margin-bottom:26px;letter-spacing:.4px;}
.f{margin-bottom:13px;}
.f label{display:block;font-size:10px;color:var(--m1);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
.f input,.f select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:9px 12px;color:var(--text);font-family:var(--fn);font-size:13px;outline:none;transition:border-color .15s;}
.f input:focus{border-color:var(--blue);}
.btn-pri{width:100%;background:var(--blue);border:none;border-radius:7px;padding:11px;color:#fff;font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:opacity .15s;}
.btn-pri:hover{opacity:.85;}
.btn-pri:disabled{opacity:.4;cursor:not-allowed;}
.err{font-size:11px;color:var(--red);margin-top:10px;text-align:center;min-height:16px;}

/* APP */
#app{display:none;}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 22px;background:var(--s1);border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.topbar-logo{font-family:var(--fh);font-size:15px;font-weight:800;color:#fff;margin-right:6px;white-space:nowrap;}
.acct-btns{display:flex;gap:6px;}
.abtn{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:6px 13px;font-family:var(--fh);font-size:11px;font-weight:600;color:var(--m1);cursor:pointer;transition:all .15s;white-space:nowrap;}
.abtn:hover{color:var(--text);}
.abtn.on{border-color:var(--blue);color:#fff;background:var(--s3);}
.user-chip{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--m1);}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--blue-bg);border:1px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--blue);font-weight:700;flex-shrink:0;}
.icon-btn{background:none;border:1px solid var(--bd);border-radius:5px;padding:4px 10px;color:var(--m2);font-size:10px;cursor:pointer;font-family:var(--fn);transition:all .15s;}
.icon-btn:hover{color:var(--text);border-color:var(--bd2);}
.icon-btn.danger:hover{color:var(--red);border-color:var(--red);}

/* BANNER */
#prov-banner{background:var(--yellow-bg);border:1px solid var(--yellow);border-radius:8px;padding:10px 16px;margin:14px 22px 0;font-size:12px;color:var(--yellow);display:none;align-items:center;justify-content:space-between;gap:12px;}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:16px 22px 0;}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr);}}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:13px 15px;}
.card-l{font-size:10px;color:var(--m2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
.card-v{font-family:var(--fh);font-size:17px;font-weight:700;}
.card-s{font-size:10px;color:var(--m2);margin-top:2px;}

/* TABS + TOOLBAR */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin:14px 22px 0;}
.tab{padding:8px 16px;font-family:var(--fh);font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--m2);border-bottom:2px solid transparent;letter-spacing:.3px;transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.ta.on{color:var(--blue);border-bottom-color:var(--blue);}
.tab.tc.on{color:var(--green);border-bottom-color:var(--green);}
.tab.td.on{color:var(--red);border-bottom-color:var(--red);}
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 22px 10px;flex-wrap:wrap;}
.srch{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:6px 11px;color:var(--text);font-family:var(--fn);font-size:12px;outline:none;width:190px;transition:border-color .15s;}
.srch::placeholder{color:var(--m2);}
.srch:focus{border-color:var(--blue);}
.sel{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--text);font-family:var(--fn);font-size:12px;outline:none;cursor:pointer;}
.cnt-lbl{font-size:11px;color:var(--m2);margin-left:auto;}
.add-btn{background:var(--green-bg);border:1px solid var(--green);border-radius:6px;padding:6px 13px;color:var(--green);font-family:var(--fh);font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.add-btn:hover{opacity:.8;}

/* TABLE */
.tw{padding:0 22px 32px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--bd2);}
th{padding:7px 9px;font-family:var(--fh);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--m2);text-align:left;white-space:nowrap;}
th.r{text-align:right;}
tbody tr{border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;}
tbody tr:hover{background:var(--s1);}
tbody tr.done{opacity:.45;}
td{padding:8px 9px;font-size:12px;vertical-align:middle;}
td.dt{color:var(--m1);white-space:nowrap;width:82px;}
td.val{text-align:right;font-weight:500;white-space:nowrap;}
.pill{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;}
.pill-c{background:var(--green-bg);color:var(--green);}
.pill-d{background:var(--red-bg);color:var(--red);}
.cat-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;background:var(--s3);color:var(--m1);margin-left:4px;}
.note-icon{font-size:10px;color:var(--yellow);margin-left:3px;}
.check-icon{color:var(--green);margin-right:3px;font-size:11px;}
.none-msg{text-align:center;padding:40px;color:var(--m2);font-family:var(--fh);}

/* USERS PAGE */
#users-page{display:none;padding:20px 22px;}
.page-title{font-family:var(--fh);font-size:16px;font-weight:800;color:#fff;margin-bottom:16px;}
.users-grid{display:grid;gap:10px;}
.user-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;}
.user-info{flex:1;}
.user-name{font-family:var(--fh);font-size:13px;font-weight:700;color:#fff;}
.user-perms{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.perm-tag{padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--fh);font-weight:600;}
.perm-all{background:var(--blue-bg);color:var(--blue);}
.perm-cred{background:var(--green-bg);color:var(--green);}
.perm-deb{background:var(--red-bg);color:var(--red);}
.perm-temp{background:var(--yellow-bg);color:var(--yellow);}
.new-user-btn{background:var(--blue-bg);border:1px solid var(--blue);border-radius:7px;padding:8px 16px;color:var(--blue);font-family:var(--fh);font-size:12px;font-weight:600;cursor:pointer;margin-bottom:14px;transition:opacity .15s;}
.new-user-btn:hover{opacity:.8;}
.perm-checks{display:flex;gap:14px;flex-wrap:wrap;padding:6px 0;}
.perm-checks label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--m1);cursor:pointer;}
.perm-checks input{width:15px;height:15px;accent-color:var(--blue);}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:12px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-head{padding:18px 20px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-title{font-family:var(--fh);font-size:15px;font-weight:700;color:#fff;}
.modal-sub{font-size:11px;color:var(--m1);margin-top:2px;}
.close-btn{background:none;border:none;color:var(--m2);font-size:18px;cursor:pointer;line-height:1;padding:0;}
.close-btn:hover{color:var(--text);}
.modal-body{padding:16px 20px;}
.mf{margin-bottom:13px;}
.mf label{display:block;font-size:10px;color:var(--m1);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.mf input,.mf select,.mf textarea{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;color:var(--text);font-family:var(--fn);font-size:12px;outline:none;resize:vertical;transition:border-color .15s;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--blue);}
.mf textarea{min-height:65px;}
.check-row{display:flex;align-items:center;gap:8px;padding:8px 0;}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;}
.check-row label{font-size:12px;color:var(--m1);cursor:pointer;}
.modal-foot{padding:13px 20px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;}
.mb{border-radius:7px;padding:8px 18px;font-family:var(--fh);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;}
.mb:hover{opacity:.8;}
.mb-save{background:var(--blue);color:#fff;}
.mb-del{background:var(--red-bg);color:var(--red);border:1px solid var(--red)!important;}
.mb-sec{background:var(--s3);color:var(--m1);border:1px solid var(--bd);}
.act-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:11px;color:var(--m1);}
.act-item:last-child{border:none;}
.act-who{color:var(--blue);font-weight:500;}
.act-time{color:var(--m2);margin-left:auto;white-space:nowrap;}

/* LOADING OVERLAY */
#loading{position:fixed;inset:0;background:rgba(13,15,20,.85);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px;}
#loading.show{display:flex;}
.spinner{width:32px;height:32px;border:3px solid var(--bd2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--m1);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:11px 18px;font-size:12px;color:var(--text);z-index:300;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="spinner"></div><div class="loading-txt" id="loading-txt">Carregando...</div></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📊 Extratos 3G</div>
    <div class="login-sub">Sistema colaborativo de extratos bancários</div>
    <div class="f"><label>Usuário</label><input type="text" id="l-user" placeholder="seu usuário" onkeydown="if(event.key===&#39;Enter&#39;)doLogin()"></div>
    <div class="f"><label>Senha</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key===&#39;Enter&#39;)doLogin()"></div>
    <button class="btn-pri" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="err" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="topbar-logo">📊 Extratos 3G</span>
    <div class="acct-btns" id="acct-btns">
      <button class="abtn on" onclick="setAcct(0,this)">MARILISY CORRETORA</button>
      <button class="abtn" onclick="setAcct(1,this)">3G CORRETORA</button>
    </div>
    <div class="user-chip">
      <div class="avatar" id="u-av"></div>
      <span id="u-label"></span>
      <button class="icon-btn" id="admin-btn" onclick="showUsers()" style="display:none">👥 Usuários</button>
      <button class="icon-btn" onclick="showChpass()">🔑 Senha</button>
      <button class="icon-btn danger" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div id="prov-banner">
    <span>⚠️ Você está usando uma senha provisória. Defina sua senha agora.</span>
    <button class="icon-btn" onclick="showChpass()">Alterar senha</button>
  </div>

  <!-- EXTRATOS VIEW -->
  <div id="extratos-view">
    <div class="cards">
      <div class="card"><div class="card-l">Total Créditos</div><div class="card-v" style="color:var(--green)" id="c1"></div><div class="card-s" id="c1s"></div></div>
      <div class="card"><div class="card-l">Total Débitos</div><div class="card-v" style="color:var(--red)" id="c2"></div><div class="card-s" id="c2s"></div></div>
      <div class="card"><div class="card-l">Resultado</div><div class="card-v" id="c3"></div><div class="card-s" id="c3s"></div></div>
    </div>
    <div class="tabs" id="tabs-row"></div>
    <div class="toolbar">
      <input class="srch" type="text" id="srch" placeholder="Buscar…" oninput="render()">
      <select class="sel" id="mes-sel" onchange="render()"><option value="">Todos os meses</option></select>
      <span class="cnt-lbl" id="cnt"></span>
      <button class="add-btn" onclick="openAdd()">+ Novo lançamento</button>
    </div>
    <div class="tw">
      <table><thead><tr id="thead-row"></tr></thead><tbody id="tbody"></tbody></table>
      <div class="none-msg" id="none-msg" style="display:none">Nenhum lançamento encontrado.</div>
    </div>
  </div>

  <!-- USERS PAGE -->
  <div id="users-page">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div class="page-title" style="margin:0">👥 Gerenciar Usuários</div>
      <button class="icon-btn" onclick="showExtrato()">← Voltar</button>
    </div>
    <button class="new-user-btn" onclick="openNewUser()">+ Cadastrar novo usuário</button>
    <div class="users-grid" id="users-grid"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="det-ov" onclick="if(event.target===this)closeDet()">
  <div class="modal" style="max-width:460px">
    <div class="modal-head">
      <div><div class="modal-title" id="det-title"></div><div class="modal-sub" id="det-sub"></div></div>
      <button class="close-btn" onclick="closeDet()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mf"><label>Categoria</label>
        <select id="det-cat"><option value="">— sem categoria —</option><option>Comissão</option><option>Repasse</option><option>Imposto</option><option>Salário</option><option>Fornecedor</option><option>Boleto</option><option>Operadora</option><option>Transferência</option><option>Despesa</option><option>Outro</option></select>
      </div>
      <div class="mf"><label>Anotação</label><textarea id="det-note" placeholder="Observação…"></textarea></div>
      <div class="check-row"><input type="checkbox" id="det-done"><label for="det-done">Marcar como conferido</label></div>
      <div style="margin-top:10px">
        <div style="font-size:10px;color:var(--m2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Histórico</div>
        <div id="det-log"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="mb mb-sec" onclick="closeDet()">Cancelar</button>
      <button class="mb mb-save" onclick="saveDet()">Salvar</button>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="add-ov" onclick="if(event.target===this)closeAdd()">
  <div class="modal" style="max-width:460px">
    <div class="modal-head"><div><div class="modal-title">Novo lançamento</div></div><button class="close-btn" onclick="closeAdd()">✕</button></div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="mf"><label>Data</label><input type="date" id="a-date"></div>
        <div class="mf"><label>Tipo</label><select id="a-tipo"><option value="cred">Crédito (+)</option><option value="deb">Débito (-)</option></select></div>
      </div>
      <div class="mf"><label>Nome / Descrição</label><input type="text" id="a-desc" placeholder="Nome da pessoa ou empresa"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="mf"><label>Valor (R$)</label><input type="number" id="a-val" placeholder="0,00" step="0.01" min="0"></div>
        <div class="mf"><label>Documento</label><input type="text" id="a-doc" placeholder="PIX, boleto..."></div>
      </div>
      <div class="mf"><label>Categoria</label><select id="a-cat"><option value="">— sem categoria —</option><option>Comissão</option><option>Repasse</option><option>Imposto</option><option>Salário</option><option>Fornecedor</option><option>Boleto</option><option>Operadora</option><option>Transferência</option><option>Despesa</option><option>Outro</option></select></div>
      <div class="mf"><label>Anotação</label><textarea id="a-note" placeholder="Observação opcional…"></textarea></div>
    </div>
    <div class="modal-foot"><button class="mb mb-sec" onclick="closeAdd()">Cancelar</button><button class="mb mb-save" onclick="saveAdd()">Adicionar</button></div>
  </div>
</div>

<!-- USER MODAL -->
<div class="overlay" id="usr-ov" onclick="if(event.target===this)closeUsr()">
  <div class="modal" style="max-width:420px">
    <div class="modal-head"><div><div class="modal-title" id="usr-title">Novo Usuário</div></div><button class="close-btn" onclick="closeUsr()">✕</button></div>
    <div class="modal-body">
      <div class="mf"><label>Nome de usuário</label><input type="text" id="usr-name" placeholder="ex: joao.silva"></div>
      <div class="mf"><label>Senha provisória</label><input type="password" id="usr-pass" placeholder="Senha inicial do usuário"></div>
      <div class="mf"><label>Acesso às abas</label>
        <div class="perm-checks">
          <label><input type="checkbox" id="p-all"> Todos</label>
          <label><input type="checkbox" id="p-cred"> Créditos</label>
          <label><input type="checkbox" id="p-deb"> Débitos</label>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="mb mb-del" id="usr-del-btn" onclick="deleteUser()" style="display:none">Excluir</button>
      <button class="mb mb-sec" onclick="closeUsr()">Cancelar</button>
      <button class="mb mb-save" onclick="saveUser()">Salvar</button>
    </div>
  </div>
</div>

<!-- CHANGE PASS MODAL -->
<div class="overlay" id="cp-ov" onclick="if(event.target===this)closeChpass()">
  <div class="modal" style="max-width:380px">
    <div class="modal-head"><div><div class="modal-title">Alterar Senha</div></div><button class="close-btn" onclick="closeChpass()">✕</button></div>
    <div class="modal-body">
      <div class="mf"><label>Nova senha</label><input type="password" id="cp-new" placeholder="Mínimo 4 caracteres"></div>
      <div class="mf"><label>Confirmar senha</label><input type="password" id="cp-conf" placeholder="Repita a senha"></div>
      <div class="err" id="cp-err"></div>
    </div>
    <div class="modal-foot"><button class="mb mb-sec" onclick="closeChpass()">Cancelar</button><button class="mb mb-save" onclick="saveChpass()">Alterar</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycby466aLBSmQ5ztL1GIA5_--LhVOuUYMsoZUnQau40JVbXfgDzf6zkhi456_906GqsZt/exec';

// ══ API (Google Sheets via Apps Script) ══
async function apiGet(key){
  const url=`${API}?action=get&key=${encodeURIComponent(key)}`;
  const r=await fetch(url);const d=await r.json();
  return d.value?JSON.parse(d.value):null;
}
async function apiSet(key,val){
  const url=`${API}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(JSON.stringify(val))}`;
  await fetch(url);
}

// ══ LOAD/SAVE ══
async function loadAll(){
  showLoading('Carregando dados...');
  try{
    const [u,m,e]=await Promise.all([apiGet('users'),apiGet('meta'),apiGet('extra')]);
    USERS=u||{};META=m||{};EXTRA=e||{};
    if(!USERS['admin']){
      USERS['admin']={pass:'3g2026',perms:['all','cred','deb'],isAdmin:true,provisional:false};
      await apiSet('users',USERS);
    }
  }catch(err){showToast('Erro ao conectar. Verifique o Apps Script.');}
  hideLoading();
}
async function saveUsers(){showLoading('Salvando...');await apiSet('users',USERS);hideLoading();}

// ══ HELPERS ══
function fmt(v){return new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.abs(v));}
function ts(){return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function rkey(ai,i){return`${ai}_${i}`;}
function showLoading(t){document.getElementById('loading-txt').textContent=t||'Carregando...';document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}

// ══ LOGIN ══
async function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  const btn=document.getElementById('login-btn');
  if(!u||!p){err.textContent='Preencha usuário e senha.';return;}
  btn.disabled=true;btn.textContent='Carregando...';
  await loadAll();
  btn.disabled=false;btn.textContent='Entrar';
  const usr=USERS[u];
  if(!usr){err.textContent='Usuário não encontrado.';return;}
  if(usr.pass!==p){err.textContent='Senha incorreta.';return;}
  CUR=u;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('u-label').textContent=u;
  document.getElementById('u-av').textContent=u[0].toUpperCase();
  if(usr.isAdmin)document.getElementById('admin-btn').style.display='';
  if(usr.provisional)document.getElementById('prov-banner').style.display='flex';
  buildMonthFilter();buildTabs();updateCards();render();
}
function doLogout(){
  CUR=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('l-pass').value='';
  document.getElementById('l-err').textContent='';
  document.getElementById('admin-btn').style.display='none';
  document.getElementById('prov-banner').style.display='none';
  showExtrato();
}

// ══ TABS ══
function buildTabs(){
  const perms=USERS[CUR]?.perms||[];
  const row=document.getElementById('tabs-row');row.innerHTML='';
  [{k:'all',lbl:'Todos',cls:'ta'},{k:'cred',lbl:'Créditos',cls:'tc'},{k:'deb',lbl:'Débitos',cls:'td'}].forEach(d=>{
    if(!perms.includes(d.k))return;
    const b=document.createElement('button');
    b.className=`tab ${d.cls}${d.k===curTab?' on':''}`;b.textContent=d.lbl;
    b.onclick=()=>{curTab=d.k;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
    row.appendChild(b);
  });
  if(!perms.includes(curTab)&&perms.length>0)curTab=perms[0];
}

// ══ MONTH FILTER ══
function buildMonthFilter(){
  const sel=document.getElementById('mes-sel');
  const months=new Set();
  BASE_ACCOUNTS.forEach(a=>a.rows.forEach(r=>{const[d,m,y]=r.data.split('/');months.add(`${y}-${m}`);}));
  sel.innerHTML='<option value="">Todos os meses</option>';
  [...months].sort().forEach(k=>{
    const[y,m]=k.split('-');
    const lbl=new Date(y,m-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    const o=document.createElement('option');o.value=k;o.textContent=lbl.charAt(0).toUpperCase()+lbl.slice(1);sel.appendChild(o);
  });
}

// ══ ACCOUNT ══
function setAcct(i,el){acctIdx=i;document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');updateCards();render();}

// ══ CARDS ══
function updateCards(){
  const a=BASE_ACCOUNTS[acctIdx];
  const extras=EXTRA[acctIdx]||[];
  const all=[...a.rows,...extras];
  const mes=document.getElementById('mes-sel')?.value||'';
  const fil=mes?all.filter(r=>{const[d,m,y]=r.data.split('/');return`${y}-${m}`===mes;}):all;
  const tc=fil.filter(r=>r.valor>0).reduce((s,r)=>s+r.valor,0);
  const td=fil.filter(r=>r.valor<0).reduce((s,r)=>s+r.valor,0);
  const res=tc+td;
  document.getElementById('c1').textContent='R$ '+fmt(tc);
  document.getElementById('c1s').textContent=fil.filter(r=>r.valor>0).length+' lançamentos';
  document.getElementById('c2').textContent='R$ '+fmt(td);
  document.getElementById('c2s').textContent=fil.filter(r=>r.valor<0).length+' lançamentos';
  document.getElementById('c3').textContent=(res<0?'- ':'')+'R$ '+fmt(res);
  document.getElementById('c3').style.color=res>=0?'var(--green)':'var(--red)';
  document.getElementById('c3s').textContent=a.periodo;
}

// ══ RENDER ══
function render(){
  updateCards();
  const a=BASE_ACCOUNTS[acctIdx];
  const extras=EXTRA[acctIdx]||[];
  const all=[...a.rows.map((r,i)=>({...r,_k:rkey(acctIdx,i)})),...extras.map((r,i)=>({...r,_k:rkey(acctIdx,'x'+i)}))];
  const q=document.getElementById('srch').value.toLowerCase();
  const mes=document.getElementById('mes-sel').value;
  let data=all.filter(r=>{
    if(curTab==='cred'&&r.valor<=0)return false;
    if(curTab==='deb'&&r.valor>=0)return false;
    if(mes){const[d,m,y]=r.data.split('/');if(`${y}-${m}`!==mes)return false;}
    if(q&&!(r.desc+' '+r.doc+' '+r.data).toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('thead-row').innerHTML='<th>Data</th><th>Nome / Descrição</th><th>Doc</th><th>Categoria</th><th>Tipo</th><th class="r">Valor (R$)</th>';
  const tbody=document.getElementById('tbody');const none=document.getElementById('none-msg');
  tbody.innerHTML='';
  document.getElementById('cnt').textContent=data.length+' lançamento'+(data.length!==1?'s':'');
  if(!data.length){none.style.display='block';return;}none.style.display='none';
  data.forEach(r=>{
    const isCred=r.valor>0;const m=META[r._k]||{};
    const tr=document.createElement('tr');if(m.done)tr.classList.add('done');
    const chk=m.done?'<span class="check-icon">✓</span>':'';
    const nt=m.note?`<span class="note-icon" title="${(m.note||'').replace(/"/g,"'")}">📝</span>`:'';
    const cat=m.cat?`<span class="cat-badge">${m.cat}</span>`:'<span style="color:var(--m2)">—</span>';
    const dsc=r.desc||'<span style="color:var(--m2);font-style:italic">—</span>';
    tr.innerHTML=`<td class="dt">${r.data}</td><td>${chk}${dsc}${nt}</td><td style="color:var(--m2);font-size:11px">${r.doc||'—'}</td><td>${cat}</td><td><span class="pill ${isCred?'pill-c':'pill-d'}">${isCred?'crédito':'débito'}</span></td><td class="val" style="color:${isCred?'var(--green)':'var(--red)'}">${isCred?'+':'-'} ${fmt(r.valor)}</td>`;
    tr.onclick=()=>openDet(r._k,r);tbody.appendChild(tr);
  });
}

// ══ DETAIL ══
function openDet(key,r){
  curRowId=key;const m=META[key]||{};
  document.getElementById('det-title').textContent=r.desc||'Lançamento';
  document.getElementById('det-sub').textContent=`${r.data}  ·  ${r.valor>0?'+':'-'} R$ ${fmt(r.valor)}  ·  ${r.doc||'—'}`;
  document.getElementById('det-cat').value=m.cat||'';
  document.getElementById('det-note').value=m.note||'';
  document.getElementById('det-done').checked=m.done||false;
  const hist=m.log||[];
  document.getElementById('det-log').innerHTML=hist.length?hist.slice().reverse().map(l=>`<div class="act-item"><span class="act-who">${l.who}</span> ${l.msg}<span class="act-time">${l.ts}</span></div>`).join(''):'<div style="font-size:11px;color:var(--m2)">Nenhuma alteração ainda.</div>';
  document.getElementById('det-ov').classList.add('open');
}
function closeDet(){document.getElementById('det-ov').classList.remove('open');curRowId=null;}
async function saveDet(){
  const m=META[curRowId]||{};
  const nc=document.getElementById('det-cat').value;
  const nn=document.getElementById('det-note').value;
  const nd=document.getElementById('det-done').checked;
  const log=m.log||[];
  if(nc!==(m.cat||''))log.push({who:CUR,msg:`categoria → ${nc||'—'}`,ts:ts()});
  if(nn!==(m.note||''))log.push({who:CUR,msg:'anotação atualizada',ts:ts()});
  if(nd!==(m.done||false))log.push({who:CUR,msg:nd?'conferido ✓':'removeu conferido',ts:ts()});
  META[curRowId]={...m,cat:nc,note:nn,done:nd,log};
  await saveMeta();closeDet();render();showToast('Salvo ✓');
}

// ══ ADD ══
function openAdd(){document.getElementById('add-ov').classList.add('open');}
function closeAdd(){document.getElementById('add-ov').classList.remove('open');}
async function saveAdd(){
  const dt=document.getElementById('a-date').value;
  const tipo=document.getElementById('a-tipo').value;
  const desc=document.getElementById('a-desc').value.trim();
  const val=parseFloat(document.getElementById('a-val').value);
  const doc=document.getElementById('a-doc').value.trim();
  const cat=document.getElementById('a-cat').value;
  const note=document.getElementById('a-note').value.trim();
  if(!dt||!desc||isNaN(val)||val<=0){showToast('Preencha data, nome e valor.');return;}
  const[y,mo,d]=dt.split('-');
  if(!EXTRA[acctIdx])EXTRA[acctIdx]=[];
  const idx=EXTRA[acctIdx].length;
  EXTRA[acctIdx].push({data:`${d}/${mo}/${y}`,desc,doc,valor:tipo==='deb'?-val:val});
  const key=rkey(acctIdx,'x'+idx);
  if(cat||note)META[key]={cat,note,done:false,log:[{who:CUR,msg:'lançamento criado',ts:ts()}]};
  await saveExtra();await saveMeta();closeAdd();render();
  ['a-date','a-desc','a-val','a-doc','a-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('a-cat').value='';
  showToast('Lançamento adicionado ✓');
}

function showExtrato(){document.getElementById('users-page').style.display='none';document.getElementById('extratos-view').style.display='block';}
function renderUsers(){
  const grid=document.getElementById('users-grid');grid.innerHTML='';
  Object.entries(USERS).forEach(([uname,u])=>{
    const perms=u.perms||[];
    const pt=perms.map(p=>({all:'<span class="perm-tag perm-all">Todos</span>',cred:'<span class="perm-tag perm-cred">Créditos</span>',deb:'<span class="perm-tag perm-deb">Débitos</span>'}[p]||'')).join('');
    const prov=u.provisional?'<span class="perm-tag perm-temp">Senha provisória</span>':'';
    const div=document.createElement('div');div.className='user-card';
    div.innerHTML=`<div class="avatar" style="${u.isAdmin?'border-color:var(--yellow);color:var(--yellow);background:var(--yellow-bg)':''}">${uname[0].toUpperCase()}</div><div class="user-info"><div class="user-name">${uname}${u.isAdmin?' <span style="font-size:10px;color:var(--yellow)">admin</span>':''}</div><div class="user-perms">${pt}${prov}</div></div>${!u.isAdmin?`<button class="icon-btn" onclick='openEditUser("${uname}")'>Editar</button>`:''}`;
    grid.appendChild(div);
  });
}
function openNewUser(){
  editingUser=null;
  document.getElementById('usr-title').textContent='Novo Usuário';
  document.getElementById('usr-name').value='';document.getElementById('usr-name').disabled=false;
  document.getElementById('usr-pass').value='';document.getElementById('usr-pass').placeholder='Senha provisória';
  ['p-all','p-cred','p-deb'].forEach(id=>document.getElementById(id).checked=false);
  document.getElementById('usr-del-btn').style.display='none';
  document.getElementById('usr-ov').classList.add('open');
}
function openEditUser(uname){
  editingUser=uname;const u=USERS[uname];
  document.getElementById('usr-title').textContent='Editar: '+uname;
  document.getElementById('usr-name').value=uname;document.getElementById('usr-name').disabled=true;
  document.getElementById('usr-pass').value='';document.getElementById('usr-pass').placeholder='Deixe vazio para não alterar';
  document.getElementById('p-all').checked=(u.perms||[]).includes('all');
  document.getElementById('p-cred').checked=(u.perms||[]).includes('cred');
  document.getElementById('p-deb').checked=(u.perms||[]).includes('deb');
  document.getElementById('usr-del-btn').style.display='';
  document.getElementById('usr-ov').classList.add('open');
}
function closeUsr(){document.getElementById('usr-ov').classList.remove('open');editingUser=null;}
async function saveUser(){
  const uname=document.getElementById('usr-name').value.trim().toLowerCase();
  const pass=document.getElementById('usr-pass').value;
  const perms=[];
  if(document.getElementById('p-all').checked)perms.push('all');
  if(document.getElementById('p-cred').checked)perms.push('cred');
  if(document.getElementById('p-deb').checked)perms.push('deb');
  if(!uname){showToast('Informe o nome do usuário.');return;}
  if(!editingUser&&!pass){showToast('Informe a senha provisória.');return;}
  if(!perms.length){showToast('Selecione ao menos uma aba.');return;}
  if(!editingUser&&USERS[uname]){showToast('Usuário já existe.');return;}
  if(editingUser){USERS[editingUser].perms=perms;if(pass){USERS[editingUser].pass=pass;USERS[editingUser].provisional=true;}}
  else{USERS[uname]={pass,perms,isAdmin:false,provisional:true};}
  await saveUsers();closeUsr();renderUsers();showToast('Usuário salvo ✓');
}
async function deleteUser(){
  if(!editingUser)return;
  if(!confirm(`Excluir "${editingUser}"?`))return;
  delete USERS[editingUser];await saveUsers();closeUsr();renderUsers();showToast('Excluído.');
}

// ══ CHANGE PASS ══
function showChpass(){document.getElementById('cp-new').value='';document.getElementById('cp-conf').value='';document.getElementById('cp-err').textContent='';document.getElementById('cp-ov').classList.add('open');}
function closeChpass(){document.getElementById('cp-ov').classList.remove('open');}
async function saveChpass(){
  const nw=document.getElementById('cp-new').value;
  const cf=document.getElementById('cp-conf').value;
  const err=document.getElementById('cp-err');
  if(nw.length<4){err.textContent='Mínimo 4 caracteres.';return;}
  if(nw!==cf){err.textContent='As senhas não coincidem.';return;}
  USERS[CUR].pass=nw;USERS[CUR].provisional=false;
  await saveUsers();closeChpass();document.getElementById('prov-banner').style.display='none';showToast('Senha alterada ✓');
}

// ══ TOAST ══
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ══ AUTO-REFRESH a cada 20s ══
setInterval(async()=>{
  if(!CUR)return;
  try{
    const[m,e]=await Promise.all([apiGet('meta'),apiGet('extra')]);
    if(m)META=m;if(e)EXTRA=e;render();
  }catch{}
},20000);
</script>
